services:
  mem0_store:
    image: qdrant/qdrant
    environment:
    - QDRANT__STORAGE__STORAGE_PATH=/mem0/storage
    volumes:
    - mem0_storage:/mem0/storage

  openmemory-mcp:
    image: mem0/openmemory-mcp
    build: api/
    environment:
      - USER
      - API_KEY
    env_file:
      - api/.env
    depends_on:
      - mem0_store
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8765 --workers 4"
    labels:
      - coolify.traefik.middlewares=oauth2-mcp-chain@file

  openmemory-ui:
    build:
      context: ui/
      dockerfile: Dockerfile
    image: mem0/openmemory-ui:latest
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_USER_ID=${USER}
    labels:
      - coolify.traefik.middlewares=authentik-auth@file
      
volumes:
  mem0_storage:  
