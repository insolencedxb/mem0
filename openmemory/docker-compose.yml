services:
  mem0_store:
    image: qdrant/qdrant
    environment:
    - QDRANT__STORAGE__STORAGE_PATH=/mem0/storage
    volumes:
    - mem0_storage:/mem0/storage

  openmemory-mcp:
    image: mem0/openmemory-mcp
    build: api/
    environment:
      - USER
      - API_KEY
    env_file:
      - api/.env
    depends_on:
      - mem0_store
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8765 --workers 1"
    labels:
      - coolify.traefik.middlewares=oauth2-mcp-chain@file

  openmemory-ui:
    build:
      context: ui/
      dockerfile: Dockerfile
    image: mem0/openmemory-ui:latest
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_USER_ID=${USER}
    labels:
    # Default router (all non-MCP traffic): cookie-based Authentik
      - coolify.traefik.middlewares=authentik-auth@file
    # Additional router for MCP: Bearer-token via oauth2-proxy
    - traefik.http.routers.memory-mcp.rule=Host(`memory.insocore.com`) && PathPrefix(`/mcp`)
    - traefik.http.routers.memory-mcp.entrypoints=https
    - traefik.http.routers.memory-mcp.tls=true
    - traefik.http.routers.memory-mcp.tls.certresolver=letsencrypt
    - traefik.http.routers.memory-mcp.priority=500
    - traefik.http.routers.memory-mcp.middlewares=oauth2-mcp-chain@file
    - traefik.http.routers.memory-mcp.service=memory-mcp-svc
    - traefik.http.services.memory-mcp-svc.loadbalancer.server.port=8765 
volumes:
  mem0_storage:  
